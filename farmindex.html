<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Halima Dairy Farm — Complete Management System</title>
  <meta name="theme-color" content="#090F0C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg-main: #090F0C;
      --text-main: #F3F4F6;
      --text-muted: #9CA3AF;
      --text-muted-dark: #6B7280;
      --primary: #10B981;
      --primary-light: #34D399;
      --primary-btn-text: #06110D;
      --border-color: #1F2937;
      --border-card: #1F3A31;
      --bg-card: linear-gradient(135deg, #111C17 0%, #162420 100%);
      --bg-panel: #111C17;
      --bg-input: #070D0C;
      --border-input: #244238;
      --bg-back-btn: #1A2E28;
      --text-back-btn: #CBD5E1;
      --bg-table-wrapper: #0C1412;
      --bg-th: #142420;
      --border-table-row: #162924;
      --text-table: #E5E7EB;
      --bg-alert-success: #092419;
      --text-alert-success: #A7F3D0;
    }
    body.light-theme {
      --bg-main: #F9FAFB; --text-main: #111827; --text-muted: #4B5563;
      --text-muted-dark: #9CA3AF; --primary: #059669; --primary-light: #047857;
      --primary-btn-text: #FFFFFF; --border-color: #E5E7EB; --border-card: #D1FAE5;
      --bg-card: linear-gradient(135deg, #FFFFFF 0%, #F3F4F6 100%); --bg-panel: #FFFFFF;
      --bg-input: #F3F4F6; --border-input: #D1D5DB; --bg-back-btn: #EEF2F6;
      --text-back-btn: #1F2937; --bg-table-wrapper: #FFFFFF; --bg-th: #F3F4F6;
      --border-table-row: #E5E7EB; --text-table: #374151;
      --bg-alert-success: #E6F4EA; --text-alert-success: #065F46;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    html, body { width:100%; height:100%; background-color:var(--bg-main); color:var(--text-main);
      font-family:'Plus Jakarta Sans',-apple-system,sans-serif; overflow-x:hidden;
      -webkit-overflow-scrolling:touch; transition:background-color 0.2s,color 0.2s; }
    #root { padding-bottom: 80px; }

    /* ── HEADER ── */
    .app-header { display:flex; justify-content:space-between; align-items:center;
      padding:12px 16px 0 16px; margin-bottom:4px; }
    .farm-title { color:var(--primary); font-size:20px; font-weight:800; text-transform:uppercase; letter-spacing:0.3px; }
    .farm-sub { color:var(--text-muted-dark); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
    .theme-btn { background:var(--bg-panel); border:1px solid var(--border-card); color:var(--primary);
      padding:7px 11px; border-radius:8px; font-size:11px; font-weight:700; cursor:pointer;
      display:flex; align-items:center; gap:5px; text-transform:uppercase; letter-spacing:0.5px; }

    /* ── BOTTOM NAV ── */
    .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--bg-panel);
      border-top:1px solid var(--border-card); display:flex; justify-content:space-around;
      align-items:center; padding:6px 2px 14px 2px; z-index:1000; }
    .nav-item { display:flex; flex-direction:column; align-items:center; cursor:pointer;
      padding:4px 6px; border-radius:8px; min-width:44px; transition:0.15s; }
    .nav-item.active .nav-icon { color:var(--primary); }
    .nav-item.active .nav-label { color:var(--primary); }
    .nav-icon { font-size:20px; margin-bottom:1px; color:var(--text-muted-dark); }
    .nav-label { font-size:8px; font-weight:800; text-transform:uppercase; letter-spacing:0.4px; color:var(--text-muted-dark); white-space:nowrap; }

    /* ── SECTION DIVIDER ── */
    .section-divider { font-size:11px; font-weight:800; text-transform:uppercase; color:var(--primary);
      letter-spacing:0.8px; margin:20px 0 10px 0; padding-bottom:6px; border-bottom:1px solid var(--border-color); }

    /* ── DASHBOARD GRID ── */
    .dash-grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:12px; }
    .dash-grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
    .d-card { background:var(--bg-card); border:1px solid var(--border-card); border-radius:10px;
      padding:10px 12px; min-height:62px; display:flex; flex-direction:row; align-items:center;
      justify-content:space-between; cursor:pointer; transition:transform 0.15s,border-color 0.15s; }
    .d-card:active { transform:scale(0.96); border-color:var(--primary); }
    .d-card-left { display:flex; flex-direction:column; justify-content:center; }
    .d-card-icon { font-size:15px; color:var(--text-muted); }
    .d-label { color:var(--text-muted); font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; margin-bottom:2px; }
    .d-val { color:var(--text-main); font-size:18px; font-weight:800; letter-spacing:-0.4px; }
    .d-val-sm { color:var(--text-main); font-size:14px; font-weight:800; }
    .d-unit { font-size:9px; color:var(--text-muted-dark); font-weight:700; text-transform:uppercase; margin-left:2px; }
    .d-curr { font-size:12px; font-weight:700; color:var(--primary-light); margin-right:1px; }

    /* ── FORM PANEL ── */
    .page-wrap { padding:0 16px 20px 16px; }
    .form-panel { background:var(--bg-panel); border-radius:10px; padding:14px; border:1px solid var(--border-card); margin-bottom:14px; }
    .panel-header { color:var(--primary); font-size:12px; font-weight:700; margin:0 0 12px 0;
      text-transform:uppercase; border-bottom:1px solid var(--border-card); padding-bottom:6px;
      display:flex; justify-content:space-between; align-items:center; }
    .grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .input-row { display:flex; flex-direction:column; margin-bottom:10px; }
    .field-lbl { color:var(--text-muted); font-size:11px; font-weight:600; margin-bottom:4px; text-transform:uppercase; }
    .farm-input { background:var(--bg-input); border:1px solid var(--border-input); border-radius:6px;
      color:var(--text-main); padding:8px 10px; font-size:13px; font-family:inherit; width:100%; height:37px; }
    .farm-input:focus { border-color:var(--primary); outline:none; }
    .farm-input:disabled { opacity:0.6; }
    .farm-select { background:var(--bg-input); border:1px solid var(--border-input); border-radius:6px;
      color:var(--text-main); padding:8px 10px; font-size:13px; font-family:inherit; width:100%; height:37px; }
    .farm-select:focus { border-color:var(--primary); outline:none; }
    .submit-btn { background:var(--primary); color:var(--primary-btn-text); border:none; padding:11px;
      border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; width:100%;
      text-transform:uppercase; margin-top:6px; letter-spacing:0.5px; }
    .submit-btn:active { opacity:0.85; }
    .back-btn { background:var(--bg-back-btn); color:var(--text-back-btn); border:1px solid var(--border-input);
      padding:6px 12px; border-radius:4px; font-size:10px; font-weight:700; cursor:pointer; text-transform:uppercase; }

    /* ── TABLE ── */
    .tbl-wrap { width:100%; overflow-x:auto; background:var(--bg-table-wrapper); border:1px solid var(--border-card);
      border-radius:8px; margin-top:10px; }
    .data-table { width:100%; border-collapse:collapse; text-align:left; font-size:12px; min-width:480px; }
    .data-table th { background:var(--bg-th); color:var(--primary-light); padding:9px 8px; font-weight:700;
      text-transform:uppercase; font-size:10px; letter-spacing:0.4px; border-bottom:1px solid var(--border-card); }
    .data-table td { padding:9px 8px; border-bottom:1px solid var(--border-table-row); color:var(--text-table); vertical-align:middle; }
    .data-table tr:last-child td { border-bottom:none; }
    .del-btn { background:#3B1818; color:#FCA5A5; border:1px solid #5C2525; padding:3px 7px;
      border-radius:4px; font-size:10px; font-weight:700; cursor:pointer; text-transform:uppercase; }
    .del-btn:active { background:#5C2525; }

    /* ── ALERTS ── */
    .alert-box { border-radius:6px; padding:10px 12px; display:flex; align-items:center;
      justify-content:space-between; gap:8px; margin-bottom:8px; }
    .alert-danger { background:#2A1414; border-left:4px solid #EF4444; }
    .alert-warn { background:#2A1F0A; border-left:4px solid #F59E0B; }
    .alert-ok { background:var(--bg-alert-success); border-left:4px solid var(--primary); }
    .alert-txt { font-size:12px; font-weight:600; color:#FCA5A5; line-height:1.4; }
    .alert-txt-warn { font-size:12px; font-weight:600; color:#FCD34D; line-height:1.4; }
    .alert-txt-ok { font-size:12px; font-weight:600; color:var(--text-alert-success); line-height:1.4; }
    .alert-badge { font-size:9px; font-weight:800; padding:3px 7px; border-radius:10px; text-transform:uppercase; flex-shrink:0; }

    /* ── OVERLAY MODAL ── */
    .overlay { position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(5,10,8,0.88); display:flex; align-items:center; justify-content:center;
      padding:16px; z-index:2000; }
    .modal-box { background:var(--bg-panel); border:1px solid var(--border-card); border-radius:12px;
      padding:20px; width:100%; max-width:460px; max-height:85vh; overflow-y:auto; }
    .modal-title { margin:0 0 14px 0; color:var(--primary); text-transform:uppercase; font-size:14px;
      font-weight:800; border-bottom:1px solid var(--border-card); padding-bottom:6px; }

    /* ── BADGE ── */
    .badge { display:inline-block; font-size:9px; font-weight:800; padding:2px 7px; border-radius:10px; text-transform:uppercase; }
    .badge-green { background:#064E3B; color:#6EE7B7; }
    .badge-red { background:#7F1D1D; color:#FCA5A5; }
    .badge-amber { background:#78350F; color:#FCD34D; }
    .badge-blue { background:#1E3A5F; color:#93C5FD; }
    .badge-purple { background:#3B1F6B; color:#C4B5FD; }
    .badge-gray { background:#374151; color:#9CA3AF; }

    /* ── STATUS TAG ── */
    .status-tag { font-size:10px; font-weight:800; padding:3px 8px; border-radius:12px; text-transform:uppercase; }

    /* ── DELIVERY MATRIX ── */
    .matrix-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-top:8px; }
    .matrix-cell { background:var(--bg-input); border:1px solid var(--border-card); border-radius:6px;
      padding:6px 4px; text-align:center; }
    .matrix-month { font-size:9px; font-weight:800; color:var(--text-muted-dark); text-transform:uppercase; }
    .matrix-count { font-size:14px; font-weight:800; color:var(--primary); }

    /* ── QUICK ACTION CARDS ── */
    .action-card { border-radius:10px; padding:12px 14px; min-height:60px; display:flex;
      flex-direction:column; justify-content:center; cursor:pointer; transition:transform 0.15s; }
    .action-card:active { transform:scale(0.96); }
    .ac-label { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:rgba(255,255,255,0.7); margin-bottom:3px; }
    .ac-title { font-size:14px; font-weight:800; color:#fff; }

    /* ── PAGE SCROLL CONTAINER ── */
    .scroll-page { padding:0 16px 24px 16px; min-height:100vh; background:var(--bg-main); }

    /* ── REPORT ROWS ── */
    .report-row { display:flex; justify-content:space-between; align-items:center;
      padding:10px 0; border-bottom:1px solid var(--border-table-row); font-size:13px; }
    .report-row:last-child { border-bottom:none; }
    .report-key { color:var(--text-muted); font-weight:600; }
    .report-val { font-weight:800; color:var(--text-main); }

    .green-val { color:var(--primary); }
    .red-val { color:#EF4444; }
    .amber-val { color:#F59E0B; }
    .blue-val { color:#60A5FA; }

    /* inline auto-calc hint */
    .auto-hint { font-size:11px; color:var(--primary); font-weight:700; padding-top:6px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;
    const BASE_DATE = '2026-06-03';

    // ─────────────────────────────────────────────
    //  INITIAL DATA SEEDS
    // ─────────────────────────────────────────────
    const INIT_BUFFALO = [
      { id:'b1', tagId:'KORI-101', khilaNo:'A-01', shed:'Shed A', incomingDate:'2026-01-10', outgoingDate:'', status:'Fali', lactationCycle:1 },
      { id:'b2', tagId:'KORI-102', khilaNo:'A-02', shed:'Shed A', incomingDate:'2026-02-05', outgoingDate:'', status:'Pregnant', lactationCycle:1 },
      { id:'b3', tagId:'TAJI-201', khilaNo:'B-01', shed:'Shed B', incomingDate:'2026-03-15', outgoingDate:'', status:'Khali', lactationCycle:2 },

      { id:'b5', tagId:'KORI-104', khilaNo:'Tosif', shed:'Tosif', incomingDate:'2025-11-15', outgoingDate:'', status:'Fali', lactationCycle:1 }
    ];
    const INIT_FALI = [
      { id:'f1', tagId:'KORI-101', shed:'Shed A', faliDate:'2026-04-01', bull:'Bull-1', serviceCount:1, doctorResult:'', doctorDate:'' },
      { id:'f2', tagId:'KORI-102', shed:'Shed A', faliDate:'2026-03-20', bull:'Bull-2', serviceCount:1, doctorResult:'Pregnant', doctorDate:'2026-05-14' },
      { id:'f3', tagId:'TAJI-201', shed:'Shed B', faliDate:'2026-03-10', bull:'Bull-1', serviceCount:1, doctorResult:'Khali', doctorDate:'2026-05-04' }
    ];
    const INIT_KORI = [
      { id:'k1', date:'2026-01-10', bhaisWala:'Munna Bhai', animals:3, amount:450000 },
      { id:'k2', date:'2026-02-05', bhaisWala:'Munna Bhai', animals:2, amount:320000 }
    ];
    const INIT_BHAIS_PAY = [
      { id:'bp1', date:'2026-02-01', bhaisWala:'Munna Bhai', amount:200000 }
    ];
    const INIT_SLAUGHTERED = [
      { id:'sl1', tagId:'OLD-99', khilaNo:'A-10', shed:'Shed A', amount:35000, kasaiName:'Rafiq Kasai', outgoingDate:'2026-04-20' }
    ];
    const INIT_DEAD = [
      { id:'dd1', tagId:'OLD-98', khilaNo:'B-08', shed:'Shed B', outgoingDate:'2026-03-01' }
    ];
    const INIT_TAJI = [
      { id:'tj1', date:'2026-03-15', tagId:'TAJI-201', palak:'Noora', freight:3400 }
    ];
    const INIT_BAKDI = [
      { id:'bk1', date:'2026-02-10', tagId:'KORI-104', palak:'Tosif', freight:1800 }
    ];
    const INIT_IRSHAD_PAY = [
      { id:'ip1', date:'2026-04-01', type:'Taji', tagId:'TAJI-201', amount:3400 }
    ];
    const INIT_PALAK_PAY = [
      { id:'pp1', date:'2026-05-01', palak:'Noora', amount:3300, note:'May 2026' },
      { id:'pp2', date:'2026-05-01', palak:'Tosif', amount:3100, note:'May 2026' }
    ];

    // Milk book
    const INIT_PRODUCTION = [
      { date:'2026-06-03', shedAMorn:88, shedAEve:76, shedBMorn:64, shedBEve:58 },
      { date:'2026-06-02', shedAMorn:86, shedAEve:74, shedBMorn:62, shedBEve:57 },
      { date:'2026-06-01', shedAMorn:84, shedAEve:72, shedBMorn:60, shedBEve:55 }
    ];
    const INIT_SUPPLY = [
      { id:'s1', date:'2026-06-03', customer:'Zubair Hotel', mornLit:92, eveLit:60, rate:115, totalLiters:152, amount:17480 },
      { id:'s2', date:'2026-06-03', customer:'Ali Shop', mornLit:110, eveLit:88, rate:110, totalLiters:198, amount:21780 }
    ];
    const INIT_MILK_PAY = [
      { id:'mp1', date:'2026-06-01', customer:'Zubair Hotel', amount:10000 },
      { id:'mp2', date:'2026-06-01', customer:'Ali Shop', amount:5000 }
    ];

    // Labour book
    const INIT_LABOUR = [
      { id:'l1', workerName:'Rajesh Kumar', joiningDate:'2026-01-01', oldAdvance:8000, leavingDate:'', pagarPerMonth:16000, shed:'Shed A' },
      { id:'l2', workerName:'Manoj Yadav', joiningDate:'2025-11-15', oldAdvance:3500, leavingDate:'', pagarPerMonth:18500, shed:'Shed B' },
      { id:'l3', workerName:'Suresh Pal', joiningDate:'2026-02-10', oldAdvance:15000, leavingDate:'', pagarPerMonth:15000, shed:'Shed A' },
      { id:'l4', workerName:'Dinesh Solanki', joiningDate:'2026-03-01', oldAdvance:0, leavingDate:'2026-05-15', pagarPerMonth:17000, shed:'Shed B' }
    ];
    const INIT_LAB_PAY = [
      { id:'lp1', date:'2026-04-10', workerName:'Rajesh Kumar', amountTaken:5000 },
      { id:'lp2', date:'2026-05-01', workerName:'Suresh Pal', amountTaken:3000 }
    ];

    // Stock book
    const INIT_GODOWN = [
      { id:'g1', itemName:'Khal (Mustard Cake)', bags:140 },
      { id:'g2', itemName:'Chana Churi', bags:85 },
      { id:'g3', itemName:'Makai Crushed', bags:210 }
    ];

      { id:'pu1', date:'2026-05-15', broker:'Bajrang Feed', item:'Khal (Mustard Cake)', ratePerKg:32.5, weight:5000, bags:100, bagSize:50, freight:4500, freightPerKg:0.9, totalCost:167000 }

    const INIT_CONSUMPTION = [
      { id:'co1', date:'2026-06-01', itemName:'Khal (Mustard Cake)', openingBags:150, consumedBags:10, closingBags:140 },

    const INIT_MEDICINE = [

    // ─────────────────────────────────────────────

    // ─────────────────────────────────────────────
    const INIT_RATES = {
      nooraPerMonth: 3300,
      tosifPerMonth: 3100,
      irshadPerTaji: 3400,
      irshadPerBakdi: 1800
    };

    // ─────────────────────────────────────────────
    //  MAIN APP
    // ─────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState('dashboard');
      const [isDark, setIsDark] = useState(true);
      useEffect(() => {
        isDark ? document.body.classList.remove('light-theme') : document.body.classList.add('light-theme');

      // ── Global Data State ──
      const [rates, setRates] = useState(INIT_RATES);

      const [irshadPayLog, setIrshadPayLog] = useState(INIT_IRSHAD_PAY);
      const [palakPayLog, setPalakPayLog] = useState(INIT_PALAK_PAY);

      const [production, setProduction] = useState(INIT_PRODUCTION);
      const [supply, setSupply] = useState(INIT_SUPPLY);
      const [milkPayLog, setMilkPayLog] = useState(INIT_MILK_PAY);

      const [labour, setLabour] = useState(INIT_LABOUR);
      const [labPayLog, setLabPayLog] = useState(INIT_LAB_PAY);

      const [godown, setGodown] = useState(INIT_GODOWN);
      const [purchases, setPurchases] = useState(INIT_PURCHASES);
      const [consumption, setConsumption] = useState(INIT_CONSUMPTION);
      const [danaPayLog, setDanaPayLog] = useState(INIT_DANA_PAY);
      const [medicineLog, setMedicineLog] = useState(INIT_MEDICINE);

      const sharedProps = {
        tab, setTab, isDark, setIsDark, rates, setRates,
        buffalo, setBuffalo, faliLog, setFaliLog,
        koriLog, setKoriLog, bhaisPayLog, setBhaisPayLog,
        slaughtered, setSlaughtered, deadLog, setDeadLog,
        tajiLog, setTajiLog, bakdiLog, setBakdiLog,
        irshadPayLog, setIrshadPayLog, palakPayLog, setPalakPayLog,
        production, setProduction, supply, setSupply,
        milkPayLog, setMilkPayLog,
        labour, setLabour, labPayLog, setLabPayLog,
        godown, setGodown, purchases, setPurchases,
        consumption, setConsumption, danaPayLog, setDanaPayLog,
        medicineLog, setMedicineLog
      };

      return (
        <div>
          {tab === 'dashboard' && <DashboardBook {...sharedProps} />}
          {tab === 'herd' && <HerdBook {...sharedProps} />}
          {tab === 'milk' && <MilkBook {...sharedProps} />}
          {tab === 'stock' && <StockBook {...sharedProps} />}
          {tab === 'labour' && <LabourBook {...sharedProps} />}
          {tab === 'accounts' && <AccountsBook {...sharedProps} />}
          {tab === 'reports' && <ReportsBook {...sharedProps} />}
          <BottomNav tab={tab} setTab={setTab} />
        </div>
      );
    }

    // ─────────────────────────────────────────────
    //  BOTTOM NAV
    // ─────────────────────────────────────────────
    function BottomNav({ tab, setTab }) {
      const items = [
        { key:'dashboard', icon:'📊', label:'Dashboard' },
        { key:'herd',      icon:'🐃', label:'Herd' },
        { key:'milk',      icon:'🥛', label:'Milk' },
        { key:'stock',     icon:'🌾', label:'Stock' },
        { key:'labour',    icon:'👷', label:'Labour' },
        { key:'accounts',  icon:'💼', label:'Accounts' },
        { key:'reports',   icon:'📋', label:'Reports' }
      ];
      return (
        <div className="bottom-nav">
          {items.map(it => (
            <div key={it.key} className={`nav-item${tab===it.key?' active':''}`} onClick={()=>setTab(it.key)}>

          ))}
        </div>

    // ─────────────────────────────────────────────
    //  HELPERS
    // ─────────────────────────────────────────────
    function daysBetween(d1, d2) {
      const ms = new Date(d2) - new Date(d1);
      return ms > 0 ? Math.floor(ms / 86400000) : 0;
    }
    function PageHeader({ title, sub, onTheme, isDark }) {
      return (
        <div className="app-header">
          <div>
            <div className="farm-title">{title}</div>
            <div className="farm-sub">{sub}</div>
          </div>
          <button className="theme-btn" onClick={onTheme}>{isDark ? '☀️ Light' : '🌙 Dark'}</button>
        </div>
      );
    }
    function SectionDivider({ label }) {
      return <div className="section-divider">{label}</div>;
    }
    function BackBtn({ onClick }) {
      return <button className="back-btn" onClick={onClick}>◀ Back</button>;
    }
    function DelBtn({ onClick }) {
      return <button className="del-btn" onClick={onClick}>Delete</button>;
    }
    function moneyFmt(n) { return (n||0).toLocaleString('en-IN'); }

    // ─────────────────────────────────────────────
    //  DASHBOARD BOOK — Master overview
    // ─────────────────────────────────────────────
    function DashboardBook(p) {
      const [detail, setDetail] = useState(null);
      const [showRates, setShowRates] = useState(false);
      const [rateForm, setRateForm] = useState(p.rates);

      // ── Compute herd counts ──
      const activeBuffalo = p.buffalo.filter(b => !['Dead','Slaughtered'].includes(b.status) && !b.outgoingDate);
      const shedA = activeBuffalo.filter(b => b.shed === 'Shed A').length;
      const shedB = activeBuffalo.filter(b => b.shed === 'Shed B').length;
      // Yard counts are represented in herd as Yard A / Yard B shed values
      const yardA = activeBuffalo.filter(b => b.shed === 'Yard A').length;
      const yardB = activeBuffalo.filter(b => b.shed === 'Yard B').length;
      const nooraCount = activeBuffalo.filter(b => b.shed === 'Noora').length;
      const tosifCount = activeBuffalo.filter(b => b.shed === 'Tosif').length;
      const totalAnimals = shedA + shedB + yardA + yardB + nooraCount + tosifCount;

      const tajiCame = p.tajiLog.length;
      const bakdiGone = p.bakdiLog.length;
      const koriCame = p.koriLog.reduce((s,k)=>s+k.animals,0);
      const deadCount = p.deadLog.length;
      const slaCount = p.slaughtered.length;

      // fali counts
      const faliShedA = p.faliLog.filter(f => f.shed === 'Shed A' && !f.doctorResult).length;
      const faliShedB = p.faliLog.filter(f => f.shed === 'Shed B' && !f.doctorResult).length;

      // avg per taji
      const nooraAnimals = activeBuffalo.filter(b=>b.shed==='Noora').length;
      const tosifAnimals = activeBuffalo.filter(b=>b.shed==='Tosif').length;
      const nooraBill = nooraAnimals * p.rates.nooraPerMonth;
      const tosifBill = tosifAnimals * p.rates.tosifPerMonth;
      const irshadTajiBill = p.tajiLog.length * p.rates.irshadPerTaji;
      const totalTajiCost = nooraBill + tosifBill + irshadTajiBill;
      const avgPerTaji = tajiCame > 0 ? Math.round(totalTajiCost / tajiCame) : 0;

      // avg per buffalo (kori+taji cost / count)
      const koriTotal = p.koriLog.reduce((s,k)=>s+k.amount,0);
      const tajiTotal = p.tajiLog.length * p.rates.irshadPerTaji;
      const totalKoriTaji = koriTotal + tajiTotal;
      const koriTajiCount = koriCame + tajiCame;
      const avgPerBuffalo = koriTajiCount > 0 ? Math.round(totalKoriTaji / koriTajiCount) : 0;

      // avg slaughtered
      const slaTotal = p.slaughtered.reduce((s,sl)=>s+sl.amount,0);
      const avgSla = slaCount > 0 ? Math.round(slaTotal / slaCount) : 0;

      const cards = [
        { label:'Total Animals', val:totalAnimals, unit:'Hd', color:'#10B981', detail:'TOTAL_ANIMALS' },
        { label:'Shed A + Yard A', val:shedA+yardA, unit:'Hd', color:'#3B82F6', detail:'SHED_A' },
        { label:'Shed B + Yard B', val:shedB+yardB, unit:'Hd', color:'#6366F1', detail:'SHED_B' },
        { label:'Noora Stock', val:nooraCount, unit:'Hd', color:'#F59E0B', detail:'NOORA' },
        { label:'Tosif Stock', val:tosifCount, unit:'Hd', color:'#EF4444', detail:'TOSIF' },
        { label:'Taji Came', val:tajiCame, unit:'Hd', color:'#14B8A6', detail:'TAJI' },
        { label:'Bakdi Gone', val:bakdiGone, unit:'Hd', color:'#8B5CF6', detail:'BAKDI' },
        { label:'Kori Came', val:koriCame, unit:'Hd', color:'#EC4899', detail:'KORI' },
        { label:'Dead', val:deadCount, unit:'Hd', color:'#6B7280', detail:'DEAD' },
        { label:'Slaughtered', val:slaCount, unit:'Hd', color:'#DC2626', detail:'SLAUGHTERED' },
        { label:'Avg/Taji Cost', val:`₹${moneyFmt(avgPerTaji)}`, unit:'', color:'#F97316', detail:'AVG_TAJI', noFormat:true },
        { label:'Avg/Buffalo Cost', val:`₹${moneyFmt(avgPerBuffalo)}`, unit:'', color:'#A78BFA', detail:'AVG_BUF', noFormat:true },
        { label:'Fali (A/B)', val:`${faliShedA}/${faliShedB}`, unit:'', color:'#2DD4BF', detail:'FALI_COUNT', noFormat:true },
        { label:'Avg Slaughter Amt', val:`₹${moneyFmt(avgSla)}`, unit:'', color:'#F87171', detail:'AVG_SLA', noFormat:true }
      ];

      const renderDetail = () => {
        if (!detail) return null;
        let rows = [];
        let title = '';
        if (detail === 'TOTAL_ANIMALS') {
          title = 'Total Animals Breakdown';
          rows = [
            {k:'Shed A',v:shedA},{k:'Yard A',v:yardA},{k:'Shed B',v:shedB},{k:'Yard B',v:yardB},
            {k:'With Noora',v:nooraCount},{k:'With Tosif',v:tosifCount},{k:'TOTAL',v:totalAnimals}
          ];
        } else if (detail === 'SHED_A') {
          title = 'Shed A + Yard A Animals';
          rows = activeBuffalo.filter(b=>b.shed==='Shed A'||b.shed==='Yard A').map(b=>({k:b.tagId,v:b.khilaNo+' • '+b.status}));
        } else if (detail === 'SHED_B') {
          title = 'Shed B + Yard B Animals';
          rows = activeBuffalo.filter(b=>b.shed==='Shed B'||b.shed==='Yard B').map(b=>({k:b.tagId,v:b.khilaNo+' • '+b.status}));
        } else if (detail === 'NOORA') {
          title = 'Noora Stock';
          rows = activeBuffalo.filter(b=>b.shed==='Noora').map(b=>({k:b.tagId,v:b.status}));
        } else if (detail === 'TOSIF') {
          title = 'Tosif Stock';
          rows = activeBuffalo.filter(b=>b.shed==='Tosif').map(b=>({k:b.tagId,v:b.status}));
        } else if (detail === 'TAJI') {
          title = 'Taji Records (Came to Mumbai)';
          rows = p.tajiLog.map(t=>({k:t.tagId,v:t.date+' • '+t.palak+' • ₹'+moneyFmt(t.freight)}));
        } else if (detail === 'BAKDI') {
          title = 'Bakdi Records (Sent to Gujarat)';
          rows = p.bakdiLog.map(b=>({k:b.tagId,v:b.date+' • '+b.palak+' • ₹'+moneyFmt(b.freight)}));
        } else if (detail === 'KORI') {
          title = 'Kori Purchases';
          rows = p.koriLog.map(k=>({k:k.bhaisWala,v:k.date+' | '+k.animals+' Hd | ₹'+moneyFmt(k.amount)}));
        } else if (detail === 'DEAD') {
          title = 'Dead Animals';
          rows = p.deadLog.map(d=>({k:d.tagId,v:d.outgoingDate+' • '+d.shed}));
        } else if (detail === 'SLAUGHTERED') {
          title = 'Slaughtered Animals';
          rows = p.slaughtered.map(s=>({k:s.tagId,v:s.outgoingDate+' • ₹'+moneyFmt(s.amount)+' • '+s.kasaiName}));
        } else if (detail === 'AVG_TAJI') {
          title = 'Avg Cost Per Taji Calculation';
          rows = [
            {k:'Noora Buffalo',v:nooraAnimals+' Hd'},{k:'Noora Monthly Bill',v:'₹'+moneyFmt(nooraBill)},
            {k:'Tosif Buffalo',v:tosifAnimals+' Hd'},{k:'Tosif Monthly Bill',v:'₹'+moneyFmt(tosifBill)},
            {k:'Irshad Taji Freight',v:'₹'+moneyFmt(irshadTajiBill)},{k:'Total Taji Cost',v:'₹'+moneyFmt(totalTajiCost)},
            {k:'Taji Count',v:tajiCame+' Hd'},{k:'Avg Per Taji',v:'₹'+moneyFmt(avgPerTaji)}
          ];
        } else if (detail === 'AVG_BUF') {
          title = 'Avg Cost Per Buffalo (Kori+Taji)';
          rows = [{k:'Total Kori Amount',v:'₹'+moneyFmt(koriTotal)},{k:'Total Taji Freight',v:'₹'+moneyFmt(tajiTotal)},
            {k:'Total Cost',v:'₹'+moneyFmt(totalKoriTaji)},{k:'Animals Count',v:koriTajiCount+' Hd'},{k:'Avg Per Buffalo',v:'₹'+moneyFmt(avgPerBuffalo)}];
        } else if (detail === 'FALI_COUNT') {
          title = 'Fali Animals Pending Doctor Test';
          rows = p.faliLog.filter(f=>!f.doctorResult).map(f=>({k:f.tagId,v:f.shed+' • Fali: '+f.faliDate}));
        } else if (detail === 'AVG_SLA') {
          title = 'Slaughtered Animals Amounts';
          rows = p.slaughtered.map(s=>({k:s.tagId,v:'₹'+moneyFmt(s.amount)+' — '+s.kasaiName}));
        }
        return (
          <div className="overlay" onClick={()=>setDetail(null)}>
            <div className="modal-box" onClick={e=>e.stopPropagation()}>
              <div className="modal-title">📊 {title}</div>
              {rows.map((r,i)=>(
                <div key={i} className="report-row"><span className="report-key">{r.k}</span><span className="report-val">{r.v}</span></div>
              ))}
              <button className="submit-btn" style={{marginTop:14,background:'var(--bg-back-btn)',color:'var(--primary)'}} onClick={()=>setDetail(null)}>Close</button>
            </div>
          </div>
        );
      };

      return (
        <div>
          <PageHeader title="Halima Dairy Farm" sub="Complete Management System" onTheme={()=>p.setIsDark(!p.isDark)} isDark={p.isDark} />
          <div className="scroll-page" style={{paddingTop:10}}>

            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
              <SectionDivider label="Farm Dashboard" />
              <button className="back-btn" style={{marginTop:20}} onClick={()=>setShowRates(true)}>⚙️ Rates</button>
            </div>

            <div className="dash-grid-3">
              {cards.map((c,i)=>(
                <div key={i} className="d-card" style={{borderLeft:`4px solid ${c.color}`}} onClick={()=>setDetail(c.detail)}>
                  <div className="d-card-left">
                    <div className="d-label">{c.label}</div>
                    {c.noFormat
                      ? <div className="d-val-sm">{c.val}</div>
                      : <div style={{display:'flex',alignItems:'baseline'}}>
                          <span className="d-val">{c.val}</span>
                          {c.unit && <span className="d-unit">{c.unit}</span>}
                        </div>
                    }
                  </div>
                  <span style={{fontSize:12,color:'var(--text-muted)'}}>➔</span>
                </div>
              ))}
              {/* Doctor Button */}
              <div className="d-card" style={{borderLeft:'4px solid #F59E0B',background:'linear-gradient(135deg,#1C1200,#2A1F00)'}} onClick={()=>p.setTab('herd')}>
                <div className="d-card-left">
                  <div className="d-label">Doctor's Page</div>
                  <div className="d-val-sm" style={{color:'#FCD34D'}}>🩺 Open</div>
                </div>
                <span style={{fontSize:12,color:'#F59E0B'}}>➔</span>
              </div>
            </div>

            {/* Delivery Matrix */}
            <SectionDivider label="12-Month Expected Delivery Matrix" />
            <DeliveryMatrix faliLog={p.faliLog} />

            {/* Alerts */}
            <SectionDivider label="System Alerts" />
            <HerdAlerts buffalo={p.buffalo} faliLog={p.faliLog} />
          </div>

          {/* Rates Modal */}
          {showRates && (
            <div className="overlay" onClick={()=>setShowRates(false)}>
              <div className="modal-box" onClick={e=>e.stopPropagation()}>
                <div className="modal-title">⚙️ Rate Configuration</div>
                {[
                  ['nooraPerMonth','Noora Per Month (₹)'],
                  ['tosifPerMonth','Tosif Per Month (₹)'],
                  ['irshadPerTaji','Irshad Per Taji (₹)'],
                  ['irshadPerBakdi','Irshad Per Bakdi (₹)']
                ].map(([k,l])=>(
                  <div key={k} className="input-row">
                    <label className="field-lbl">{l}</label>
                    <input type="number" className="farm-input" value={rateForm[k]}
                      onChange={e=>setRateForm({...rateForm,[k]:Number(e.target.value)})} />
                  </div>
                ))}
                <button className="submit-btn" onClick={()=>{p.setRates(rateForm);setShowRates(false);}}>Save Rates</button>
              </div>
            </div>
          )}
          {renderDetail()}
        </div>
      );
    }

    function DeliveryMatrix({ faliLog }) {
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const counts = Array(12).fill(0);
      faliLog.forEach(f => {
        const fDate = new Date(f.faliDate);
        // Expected delivery ~10 months after fali date
        const delivDate = new Date(fDate);
        delivDate.setMonth(delivDate.getMonth() + 10);
        counts[delivDate.getMonth()]++;
      });
      return (
        <div className="matrix-grid">
          {months.map((m,i)=>(
            <div key={m} className="matrix-cell">
              <div className="matrix-month">{m}</div>
              <div className="matrix-count">{counts[i]} Hd</div>
            </div>
          ))}
        </div>
      );
    }

    function HerdAlerts({ buffalo, faliLog }) {
      const alerts = [];
      const today = new Date(BASE_DATE);
      // 60-day unserviced from incoming date
      buffalo.filter(b=>!b.outgoingDate && !['Dead','Slaughtered'].includes(b.status)).forEach(b=>{
        const days = daysBetween(b.incomingDate, BASE_DATE);
        const hasFali = faliLog.some(f=>f.tagId===b.tagId);
        if (days > 60 && !hasFali) {
          alerts.push({ type:'warn', msg:`🐃 ${b.tagId} (${b.khilaNo}) — Not serviced in ${days} days from incoming date.` });
        }
      });
      // 30-day khali not re-serviced
      faliLog.filter(f=>f.doctorResult==='Khali').forEach(f=>{
        const reServiced = faliLog.filter(ff=>ff.tagId===f.tagId && ff.faliDate > f.doctorDate);
        if (reServiced.length===0) {
          const days = daysBetween(f.doctorDate||f.faliDate, BASE_DATE);
          if (days > 30) {
            alerts.push({ type:'danger', msg:`🚨 ${f.tagId} — Khali since ${f.doctorDate||f.faliDate}. ${days} days without re-service.` });
          }
        }
      });
      if (alerts.length === 0) return (
        <div className="alert-box alert-ok"><span className="alert-txt-ok">✅ All alerts clear. Farm operations normal.</span></div>
      );
      return alerts.map((a,i)=>(
        <div key={i} className={`alert-box ${a.type==='danger'?'alert-danger':'alert-warn'}`}>
          <span className={a.type==='danger'?'alert-txt':'alert-txt-warn'}>{a.msg}</span>
        </div>
      ));
    }

    // ─────────────────────────────────────────────
    //  HERD BOOK
    // ─────────────────────────────────────────────

      if (view === 'DEAD_ENTRY') return <DeadEntry {...p} onBack={()=>setView('DASHBOARD')} />;

            <SectionDivider label="Quick Actions" />
            <div className="dash-grid-2">
              {[
                {label:'Buffalo Entry',icon:'🐃',view:'BUFFALO_ENTRY',color:'#3B82F6'},
                {label:'Fali / Service',icon:'🐂',view:'FALI_ENTRY',color:'#10B981'},
                {label:'Add Kori',icon:'📥',view:'KORI_ENTRY',color:'#F59E0B'},
                {label:'Taji / Bakdi',icon:'🚚',view:'TAJI_BAKDI',color:'#14B8A6'},
                {label:'Slaughtered',icon:'🔪',view:'SLAUGHTER_ENTRY',color:'#EF4444'},
                {label:'Dead Animals',icon:'💀',view:'DEAD_ENTRY',color:'#6B7280'},
                {label:'🩺 Doctor Page',icon:'',view:'DOCTORS',color:'#F59E0B'},
                {label:'Bhaiswala Ledger',icon:'💰',view:'BHAIS_PAY',color:'#A855F7'},
                {label:'Palak Payments',icon:'👤',view:'PALAK_PAY',color:'#EC4899'},

    function PalakBillSummary({ buffalo, rates, tajiLog }) {
      const active = buffalo.filter(b=>!b.outgoingDate && !['Dead','Slaughtered'].includes(b.status));
      const nooraCount = active.filter(b=>b.shed==='Noora').length;
      const tosifCount = active.filter(b=>b.shed==='Tosif').length;

      const tosifBill = tosifCount * rates.tosifPerMonth;
      const irshadTajiBill = tajiLog.length * rates.irshadPerTaji;
      return (
        <div className="form-panel">
          {[
            {k:'Noora ('+nooraCount+' Hd × ₹'+rates.nooraPerMonth+')',v:'₹'+moneyFmt(nooraBill)},
            {k:'Tosif ('+tosifCount+' Hd × ₹'+rates.tosifPerMonth+')',v:'₹'+moneyFmt(tosifBill)},
            {k:'Irshad Taji Freight ('+tajiLog.length+' × ₹'+rates.irshadPerTaji+')',v:'₹'+moneyFmt(irshadTajiBill)},
          ].map((r,i)=>(
            <div key={i} className="report-row"><span className="report-key">{r.k}</span><span className="report-val green-val">{r.v}</span></div>

    // ── Buffalo Entry ──
    function BuffaloEntry({ buffalo, setBuffalo, onBack }) {
      const [form, setForm] = useState({ tagId:'', khilaNo:'', shed:'Shed A', incomingDate:'', status:'Fali', lactationCycle:1 });
      const submit = e => {
        e.preventDefault();
        if (buffalo.some(b=>b.tagId.toLowerCase()===form.tagId.trim().toLowerCase())) {
          alert('Tag ID already exists!'); return;
        }
        setBuffalo(prev=>[...prev, { id:'b-'+Date.now(), ...form, tagId:form.tagId.trim().toUpperCase(), outgoingDate:'' }]);
        alert('Buffalo registered: '+form.tagId);
        setForm({ tagId:'', khilaNo:'', shed:'Shed A', incomingDate:'', status:'Fali', lactationCycle:1 });
      };
      return (

    // ── Slaughter Entry ──
    function SlaughterEntry({ slaughtered, setSlaughtered, buffalo, setBuffalo, onBack }) {
      const [form, setForm] = useState({ tagId:'', khilaNo:'', shed:'Shed A', amount:'', kasaiName:'', outgoingDate:'' });
      const tagMatch = buffalo.find(b=>b.tagId.toUpperCase()===form.tagId.trim().toUpperCase());
      useEffect(()=>{ if(tagMatch){ setForm(f=>({...f,khilaNo:tagMatch.khilaNo,shed:tagMatch.shed})); } },[form.tagId]);
      const submit = e => {
        e.preventDefault();
        const entry = {id:'sl-'+Date.now(),...form,tagId:form.tagId.trim().toUpperCase(),amount:Number(form.amount)};
        setSlaughtered(prev=>[...prev,entry]);
        if(tagMatch) setBuffalo(prev=>prev.map(b=>b.tagId===entry.tagId?{...b,status:'Slaughtered',outgoingDate:form.outgoingDate}:b));
        alert('Slaughter record saved.');
        setForm({tagId:'',khilaNo:'',shed:'Shed A',amount:'',kasaiName:'',outgoingDate:''});
      };
      return (
        <div className="scroll-page" style={{paddingTop:10}}>
          <div className="form-panel">
            <div className="panel-header"><span>Slaughtered Entry</span><BackBtn onClick={onBack} /></div>

    // ─────────────────────────────────────────────
    //  MILK BOOK
    // ─────────────────────────────────────────────
    const FIXED_HERD = 192;
    function MilkBook(p) {
      const [view, setView] = useState('DASHBOARD');
      const [opDate, setOpDate] = useState(BASE_DATE);
      const [detail, setDetail] = useState(null);

      if (view === 'PRODUCTION') return <ProductionEntry {...p} opDate={opDate} onBack={()=>setView('DASHBOARD')} />;
      if (view === 'SUPPLY') return <SupplyEntry {...p} opDate={opDate} onBack={()=>setView('DASHBOARD')} />;
      if (view === 'PAYMENT') return <MilkPaymentEntry {...p} onBack={()=>setView('DASHBOARD')} />;
      if (view === 'BILL') return <BillGenerator {...p} onBack={()=>setView('DASHBOARD')} />;
      if (view === 'SUPPLY_TABLE') return <SupplyHistoryPage {...p} onBack={()=>setView('DASHBOARD')} />;

      const todayProd = p.production.find(pr=>pr.date===opDate) || {shedAMorn:0,shedAEve:0,shedBMorn:0,shedBEve:0};
      const shedATotal = (todayProd.shedAMorn||0)+(todayProd.shedAEve||0);
      const shedBTotal = (todayProd.shedBMorn||0)+(todayProd.shedBEve||0);
      const totalProd = shedATotal + shedBTotal;
      const avgPerBuf = (totalProd/FIXED_HERD).toFixed(2);
      const totalBill = p.supply.reduce((s,x)=>s+x.amount,0);
      const totalRcvd = p.milkPayLog.reduce((s,x)=>s+x.amount,0);
      const outstanding = totalBill - totalRcvd;

      const renderDetail = () => {
        if (!detail) return null;
        let rows=[], title='';
        if (detail==='TOTAL_PROD') { title='Herd Production History'; rows=p.production.map(pr=>({k:pr.date,v:(pr.shedAMorn+pr.shedAEve+pr.shedBMorn+pr.shedBEve)+' L'})); }
        else if (detail==='SHED_A') { title='Shed A Production History'; rows=p.production.map(pr=>({k:pr.date,v:`Morn: ${pr.shedAMorn}L  Eve: ${pr.shedAEve}L  Total: ${pr.shedAMorn+pr.shedAEve}L`})); }
        else if (detail==='SHED_B') { title='Shed B Production History'; rows=p.production.map(pr=>({k:pr.date,v:`Morn: ${pr.shedBMorn}L  Eve: ${pr.shedBEve}L  Total: ${pr.shedBMorn+pr.shedBEve}L`})); }
        else if (detail==='BILL') { title='Total Bill Breakdown'; const cm={}; p.supply.forEach(s=>{if(!cm[s.customer])cm[s.customer]=0;cm[s.customer]+=s.amount;}); rows=Object.entries(cm).map(([c,v])=>({k:c,v:'₹'+moneyFmt(v)})); }
        else if (detail==='RCVD') { title='Payments Received'; rows=p.milkPayLog.map(m=>({k:m.customer+' • '+m.date,v:'₹'+moneyFmt(m.amount)})); }
        else if (detail==='OUT') { title='Outstanding per Customer'; const cm={},pm={}; p.supply.forEach(s=>{if(!cm[s.customer])cm[s.customer]=0;cm[s.customer]+=s.amount;}); p.milkPayLog.forEach(m=>{if(!pm[m.customer])pm[m.customer]=0;pm[m.customer]+=m.amount;}); rows=Object.keys(cm).map(c=>({k:c,v:'₹'+moneyFmt(cm[c]-(pm[c]||0))})); }
        return (
          <div className="overlay" onClick={()=>setDetail(null)}>
            <div className="modal-box" onClick={e=>e.stopPropagation()}>
              <div className="modal-title">🥛 {title}</div>
              {rows.map((r,i)=><div key={i} className="report-row"><span className="report-key">{r.k}</span><span className="report-val">{r.v}</span></div>)}
              <button className="submit-btn" style={{marginTop:14,background:'var(--bg-back-btn)',color:'var(--primary)'}} onClick={()=>setDetail(null)}>Close</button>
            </div>
          </div>
        );
      };

      return (
        <div>
          <div className="app-header">
            <div><div className="farm-title">Milk Book</div><div className="farm-sub">Supply & Production</div></div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <input type="date" style={{background:'var(--bg-input)',border:'1px solid var(--border-input)',padding:'6px 8px',borderRadius:8,color:'var(--text-main)',fontFamily:'inherit',fontSize:11,fontWeight:700}} value={opDate} onChange={e=>setOpDate(e.target.value)} />
              <button className="theme-btn" onClick={()=>p.setIsDark(!p.isDark)}>{p.isDark?'☀️':'🌙'}</button>
            </div>
          </div>
          <div className="scroll-page" style={{paddingTop:10}}>
            <SectionDivider label="Production Dashboard" />
            <div className="dash-grid-2">
              {[
                {label:'Total Production',val:totalProd,unit:'L',color:'#10B981',det:'TOTAL_PROD'},
                {label:'Avg / Buffalo (192)',val:avgPerBuf,unit:'L',color:'#3B82F6',det:'SHED_A'},
                {label:'Shed A Total',val:shedATotal,unit:'L',color:'#A855F7',det:'SHED_A'},
                {label:'Shed B Total',val:shedBTotal,unit:'L',color:'#A855F7',det:'SHED_B'},
                {label:'Total Bill Amt',val:'₹'+moneyFmt(totalBill),unit:'',color:'#F59E0B',det:'BILL',noFmt:true},
                {label:'Total Received',val:'₹'+moneyFmt(totalRcvd),unit:'',color:'#10B981',det:'RCVD',noFmt:true},
                {label:'Outstanding',val:'₹'+moneyFmt(outstanding),unit:'',color:'#EF4444',det:'OUT',noFmt:true}
              ].map((c,i)=>(
                <div key={i} className="d-card" style={{borderLeft:`4px solid ${c.color}`}} onClick={()=>setDetail(c.det)}>
                  <div className="d-card-left"><div className="d-label">{c.label}</div>
                    <div className="d-val-sm" style={{color:c.color}}>{c.noFmt?c.val:<span>{c.val}<span className="d-unit"> {c.unit}</span></span>}</div>
                  </div><span style={{fontSize:12,color:'var(--text-muted)'}}>➔</span>
                </div>
              ))}
            </div>
            <SectionDivider label="Quick Actions" />
            <div className="dash-grid-2">
              {[
                {label:'Enter Production',icon:'🥛',v:'PRODUCTION',color:'#10B981'},
                {label:'Customer Supply',icon:'📦',v:'SUPPLY',color:'#3B82F6'},
                {label:'Receive Payment',icon:'💰',v:'PAYMENT',color:'#F59E0B'},
                {label:'Generate Bill',icon:'🧾',v:'BILL',color:'#EC4899'},
                {label:'Supply History',icon:'📋',v:'SUPPLY_TABLE',color:'#8B5CF6'},
              ].map(btn=>(
                <div key={btn.v} className="action-card" style={{background:`linear-gradient(135deg,${btn.color}22,${btn.color}44)`,border:`1px solid ${btn.color}55`}} onClick={()=>setView(btn.v)}>
                  <div className="ac-label">Milk Book</div>
                  <div className="ac-title">{btn.icon} {btn.label}</div>
                </div>
              ))}
            </div>
          </div>
          {renderDetail()}
        </div>
      );
    }

    function ProductionEntry({ production, setProduction, opDate, onBack }) {
      const existing = production.find(p=>p.date===opDate) || {};
      const [am,setAm] = useState(existing.shedAMorn||'');
      const [ae,setAe] = useState(existing.shedAEve||'');
      const [bm,setBm] = useState(existing.shedBMorn||'');
      const [be,setBe] = useState(existing.shedBEve||'');
      const submit = e => {
        e.preventDefault();
        const entry = {date:opDate,shedAMorn:Number(am),shedAEve:Number(ae),shedBMorn:Number(bm),shedBEve:Number(be)};
        setProduction(prev=>[...prev.filter(p=>p.date!==opDate),entry].sort((a,b)=>b.date.localeCompare(a.date)));
        alert('Production saved for '+opDate);
        onBack();
      };
      return (
        <div className="scroll-page" style={{paddingTop:10}}>
          <div className="form-panel">
            <div className="panel-header"><span>Daily Production — {opDate}</span><BackBtn onClick={onBack} /></div>
            <form onSubmit={submit}>
              <div style={{color:'var(--primary)',fontSize:11,fontWeight:800,marginBottom:6,textTransform:'uppercase'}}>Shed A</div>
              <div className="grid-2">
                <div className="input-row"><label className="field-lbl">Morning (L)</label><input type="number" className="farm-input" required value={am} onChange={e=>setAm(e.target.value)} /></div>
                <div className="input-row"><label className="field-lbl">Evening (L)</label><input type="number" className="farm-input" required value={ae} onChange={e=>setAe(e.target.value)} /></div>
              </div>
              <div style={{color:'var(--primary)',fontSize:11,fontWeight:800,margin:'10px 0 6px',textTransform:'uppercase'}}>Shed B</div>
              <div className="grid-2">
                <div className="input-row"><label className="field-lbl">Morning (L)</label><input type="number" className="farm-input" required value={bm} onChange={e=>setBm(e.target.value)} /></div>
                <div className="input-row"><label className="field-lbl">Evening (L)</label><input type="number" className="farm-input" required value={be} onChange={e=>setBe(e.target.value)} /></div>
              </div>
              <button type="submit" className="submit-btn">Save Production</button>
            </form>
          </div>
          <SectionDivider label="Production History" />
          <div className="tbl-wrap">
            <table className="data-table">
              <thead><tr><th>Date</th><th>Shed A</th><th>Shed B</th><th>Total</th><th>Del</th></tr></thead>
              <tbody>{production.map(pr=>(
                <tr key={pr.date}><td>{pr.date}</td><td>{pr.shedAMorn+pr.shedAEve}L</td><td>{pr.shedBMorn+pr.shedBEve}L</td>
                  <td style={{fontWeight:800,color:'var(--primary)'}}>{pr.shedAMorn+pr.shedAEve+pr.shedBMorn+pr.shedBEve}L</td>
                  <td><DelBtn onClick={()=>{if(window.confirm('Delete '+pr.date+'?'))setProduction(prev=>prev.filter(x=>x.date!==pr.date))}} /></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      );
    }

    function SupplyEntry({ supply, setSupply, opDate, onBack }) {
      const [form, setForm] = useState({ date:opDate, customer:'', mornLit:'', eveLit:'', rate:'' });
      const total = (Number(form.mornLit)||0)+(Number(form.eveLit)||0);
      const amt = total*(Number(form.rate)||0);
      const getLastSupply = (cust) => supply.filter(s=>s.customer===cust).sort((a,b)=>b.date.localeCompare(a.date))[0];
      useEffect(()=>{
        if(form.customer){
          const last = getLastSupply(form.customer);
          if(last){ setForm(f=>({...f,eveLit:last.eveLit.toString(),rate:last.rate.toString()})); }
        }
      },[form.customer]);
      const submit = e => {
        e.preventDefault();
        setSupply(prev=>[...prev,{id:'s-'+Date.now(),...form,mornLit:Number(form.mornLit),eveLit:Number(form.eveLit),rate:Number(form.rate),totalLiters:total,amount:amt}]);
        alert('Supply entry saved.');
        setForm({date:opDate,customer:'',mornLit:'',eveLit:'',rate:''});
      };
      return (
        <div className="scroll-page" style={{paddingTop:10}}>
          <div className="form-panel">
            <div className="panel-header"><span>Customer Supply Entry</span><BackBtn onClick={onBack} /></div>
            <form onSubmit={submit}>
              <div className="grid-2">
                <div className="input-row"><label className="field-lbl">Date</label><input type="date" className="farm-input" required value={form.date} onChange={e=>setForm({...form,date:e.target.value})} /></div>
                <div className="input-row"><label className="field-lbl">Customer Name</label><input type="text" className="farm-input" required value={form.customer} onChange={e=>setForm({...form,customer:e.target.value})} /></div>
              </div>
              <div className="grid-2">
                <div className="input-row"><label className="field-lbl">Morning (L)</label><input type="number" step="any" className="farm-input" required value={form.mornLit} onChange={e=>setForm({...form,mornLit:e.target.value})} /></div>
                <div className="input-row"><label className="field-lbl">Evening (L — Auto prev)</label><input type="number" step="any" className="farm-input" required value={form.eveLit} onChange={e=>setForm({...form,eveLit:e.target.value})} /></div>
              </div>

    function BillGenerator({ supply, milkPayLog, onBack }) {
      const [cust, setCust] = useState('');
      const [from, setFrom] = useState('2026-05-31');
      const [to, setTo] = useState(BASE_DATE);
      const [oldBalance, setOldBalance] = useState('');
      const customers = [...new Set(supply.map(s=>s.customer))];
      const getBill = () => {
        if (!cust) return null;
        const rows = supply.filter(s=>s.customer===cust && s.date>=from && s.date<=to).sort((a,b)=>a.date.localeCompare(b.date));
        const currentTotal = rows.reduce((t,r)=>t+r.amount,0);
        const oldBal = Number(oldBalance)||0;
        const periodPayments = milkPayLog.filter(m=>m.customer===cust && m.date>=from && m.date<=to).reduce((t,m)=>t+m.amount,0);
        const netAmount = oldBal + currentTotal - periodPayments;
        return {rows, currentTotal, oldBal, periodPayments, netAmount};
      };
      const bill = getBill();
      const shareWA = () => {
        if (!bill || bill.rows.length===0) return alert('No data found.');
        let msg = `🥛 *HALIMA DAIRY FARM — MILK BILL* 🥛\n👤 Customer: ${cust}\n📅 Period: ${from} → ${to}\n━━━━━━━━━━━━━━━━━━━━━━\n`;
        msg += `Date | Morn | Eve | Total | Rate | Amount\n`;
        bill.rows.forEach(r=>{ msg+=`${r.date} | ${r.mornLit}L | ${r.eveLit}L | ${r.totalLiters}L | ₹${r.rate} | ₹${moneyFmt(r.amount)}\n`; });
        msg+=`━━━━━━━━━━━━━━━━━━━━━━\n🔹 Old Balance: ₹${moneyFmt(bill.oldBal)}\n🔹 Current Bill: ₹${moneyFmt(bill.currentTotal)}\n💸 Payments Received: ₹${moneyFmt(bill.periodPayments)}\n✨ *NET PAYABLE: ₹${moneyFmt(bill.netAmount)}*\n📞 Thank you! – Halima Dairy`;
        window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
      };
      return (
        <div className="scroll-page" style={{paddingTop:10}}>
          <div className="form-panel">
            <div className="panel-header"><span>Generate Customer Bill</span><BackBtn onClick={onBack} /></div>
            <div className="input-row"><label className="field-lbl">Customer</label>
              <select className="farm-select" value={cust} onChange={e=>setCust(e.target.value)}>
                <option value="">-- Select Customer --</option>
                {customers.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="grid-2">
              <div className="input-row"><label className="field-lbl">From Date</label><input type="date" className="farm-input" value={from} onChange={e=>setFrom(e.target.value)} /></div>
              <div className="input-row"><label className="field-lbl">To Date</label><input type="date" className="farm-input" value={to} onChange={e=>setTo(e.target.value)} /></div>
            </div>
            <div className="input-row"><label className="field-lbl">Old Balance (Manual ₹)</label><input type="number" className="farm-input" value={oldBalance} onChange={e=>setOldBalance(e.target.value)} placeholder="Enter previous balance" /></div>
            <button className="submit-btn" style={{background:'#25D366',color:'#000'}} onClick={shareWA}>📲 Share Bill on WhatsApp</button>
          </div>
          {bill && bill.rows.length>0 && (
            <div className="form-panel">
              <div className="panel-header">Bill Preview — {cust}</div>
              <div className="tbl-wrap">
                <table className="data-table">
                  <thead><tr><th>Date</th><th>Morning</th><th>Evening</th><th>Total</th><th>Rate</th><th>Amount</th></tr></thead>
                  <tbody>{bill.rows.map(r=>(
                    <tr key={r.id}><td>{r.date}</td><td>{r.mornLit}L</td><td>{r.eveLit}L</td>
                      <td style={{fontWeight:700}}>{r.totalLiters}L</td><td>₹{r.rate}</td><td className="green-val">₹{moneyFmt(r.amount)}</td></tr>
                  ))}</tbody>
                </table>
              </div>
              <div style={{padding:'10px 0'}}>
                {[['Old Balance','₹'+moneyFmt(bill.oldBal)],['Current Bill','₹'+moneyFmt(bill.currentTotal)],['Payments Received','₹'+moneyFmt(bill.periodPayments)],['NET PAYABLE','₹'+moneyFmt(bill.netAmount)]].map(([k,v],i)=>(
                  <div key={i} className="report-row"><span className="report-key">{k}</span><span className="report-val" style={i===3?{color:'var(--primary)',fontSize:15}:{}}>{v}</span></div>
                ))}
              </div>
            </div>

      );
    }

    function StockBook(p) {
      const [view, setView] = useState('DASHBOARD');
      const [detail, setDetail] = useState(null);

      if (view === 'PURCHASE') return <PurchaseEntry {...p} onBack={()=>setView('DASHBOARD')} />;
      if (view === 'CONSUME') return <ConsumptionEntry {...p} onBack={()=>setView('DASHBOARD')} />;
      if (view === 'LEDGER') return <DanaLedger {...p} onBack={()=>setView('DASHBOARD')} />;
      if (view === 'GODOWN') return <GodownPage {...p} onBack={()=>setView('DASHBOARD')} />;

      const analytics = useMemo(()=>{
        const uniqueDays = [...new Set(p.consumption.map(c=>c.date))].length || 1;
        const bagSizeMap = {};
        p.purchases.forEach(pu=>{ bagSizeMap[pu.item?.toLowerCase()] = pu.bagSize || 50; });
        let totalKg = 0;
        p.consumption.forEach(c=>{ totalKg += c.consumedBags * (bagSizeMap[c.itemName?.toLowerCase()]||50); });
        const dailyKg = parseFloat((totalKg/uniqueDays).toFixed(2));
        const globalW = p.purchases.reduce((s,pu)=>s+pu.weight,0);
        const globalC = p.purchases.reduce((s,pu)=>s+pu.totalCost,0);
        const avgCostKg = globalW>0 ? parseFloat((globalC/globalW).toFixed(2)) : 0;
        const totalAnimals = p.buffalo.filter(b=>!b.outgoingDate&&!['Dead','Slaughtered'].includes(b.status)).length || 1;
        const avgPerBuf = parseFloat((dailyKg/totalAnimals).toFixed(2));
        let godownVal = 0;
        p.godown.forEach(g=>{ const rate=(avgCostKg||33.5); const bagSize=(bagSizeMap[g.itemName?.toLowerCase()]||50); godownVal+=g.bags*bagSize*rate; });
        const lowAlerts = [];
        p.godown.forEach(g=>{
          const logs = p.consumption.filter(c=>c.itemName?.toLowerCase()===g.itemName?.toLowerCase());
          const totalConsumed = logs.reduce((s,c)=>s+c.consumedBags,0);
          const avgDaily = totalConsumed/uniqueDays;
          if(avgDaily>0 && g.bags < avgDaily*10) {
            lowAlerts.push({item:g.itemName,bags:g.bags,runway:Math.round(g.bags/avgDaily)});
          }
        });
        return {dailyKg,avgCostKg,avgPerBuf,godownVal:Math.round(godownVal),lowAlerts};
      },[p.purchases,p.consumption,p.godown,p.buffalo]);

      const renderDetail = () => {
        if(!detail) return null;
        let rows=[],title='';
        if(detail==='DAILY'){title='Daily Feed Consumption'; rows=p.consumption.map(c=>({k:c.date+' • '+c.itemName,v:c.consumedBags+' Bags'}));}
        else if(detail==='GODOWN'){title='Godown Stock'; rows=p.godown.map(g=>({k:g.itemName,v:g.bags+' Bags'}));}
        return(
          <div className="overlay" onClick={()=>setDetail(null)}>
            <div className="modal-box" onClick={e=>e.stopPropagation()}>
              <div className="modal-title">🌾 {title}</div>
              {rows.map((r,i)=><div key={i} className="report-row"><span className="report-key">{r.k}</span><span className="report-val">{r.v}</span></div>)}
              <button className="submit-btn" style={{marginTop:14,background:'var(--bg-back-btn)',color:'var(--primary)'}} onClick={()=>setDetail(null)}>Close</button>
            </div>
          </div>
        );
      };

      return (
        <div>
          <PageHeader title="Stock Book" sub="Feed & Godown" onTheme={()=>p.setIsDark(!p.isDark)} isDark={p.isDark} />
          <div className="scroll-page" style={{paddingTop:10}}>
            <SectionDivider label="Analytics Dashboard" />
            <div className="dash-grid-2">
              {[
                {label:'Daily Feed (KG)',val:analytics.dailyKg,unit:'KG/Day',color:'#3B82F6',det:'DAILY'},
                {label:'Avg Feed Cost',val:'₹'+analytics.avgCostKg,unit:'/KG',color:'#10B981',det:'DAILY',noFmt:true},
                {label:'Avg Feed/Buffalo',val:analytics.avgPerBuf,unit:'KG/Hd',color:'#10B981',det:'DAILY'},
                {label:'Godown Value',val:'₹'+moneyFmt(analytics.godownVal),unit:'',color:'#A855F7',det:'GODOWN',noFmt:true}
              ].map((c,i)=>(
                <div key={i} className="d-card" style={{borderLeft:`4px solid ${c.color}`}} onClick={()=>setDetail(c.det)}>
                  <div className="d-card-left"><div className="d-label">{c.label}</div>
                    <div className="d-val-sm">{c.noFmt?c.val:<span>{c.val}<span className="d-unit"> {c.unit}</span></span>}</div>
                  </div><span style={{fontSize:12,color:'var(--text-muted)'}}>➔</span>
                </div>
              ))}
            </div>
            <SectionDivider label="Stock Alerts" />
            {analytics.lowAlerts.length>0
              ? analytics.lowAlerts.map((a,i)=>(
                  <div key={i} className="alert-box alert-danger">
                    <span className="alert-txt">🚨 <strong>{a.item}</strong> — Only {a.bags} bags left (~{a.runway} days runway)</span>
                    <span className="alert-badge" style={{background:'#EF4444',color:'#fff'}}>REORDER</span>
                  </div>
                ))
              : <div className="alert-box alert-ok"><span className="alert-txt-ok">✅ All stock levels stable — 10+ day runway confirmed.</span></div>
            }
            <SectionDivider label="Godown Stock" />
            <div className="tbl-wrap">
              <table className="data-table" style={{minWidth:0}}>
                <thead><tr><th>Item</th><th>Bags</th></tr></thead>
                <tbody>{p.godown.map(g=>(
                  <tr key={g.id}><td style={{fontWeight:700}}>{g.itemName}</td>
                    <td style={{color:'var(--primary)',fontWeight:800}}>{g.bags} Bags</td></tr>
                ))}</tbody>
              </table>
            </div>
            <SectionDivider label="Quick Actions" />
            <div className="dash-grid-2">
              {[
                {label:'Buy Feed',icon:'💼',v:'PURCHASE',color:'#D97706'},
                {label:'Consumption',icon:'🌾',v:'CONSUME',color:'#3B82F6'},
                {label:'Broker Ledger',icon:'📖',v:'LEDGER',color:'#A855F7'},
                {label:'Manage Godown',icon:'🏪',v:'GODOWN',color:'#059669'},
              ].map(btn=>(
                <div key={btn.v} className="action-card" style={{background:`linear-gradient(135deg,${btn.color}22,${btn.color}44)`,border:`1px solid ${btn.color}55`}} onClick={()=>setView(btn.v)}>
                  <div className="ac-label">Stock Book</div>
                  <div className="ac-title">{btn.icon} {btn.label}</div>
                </div>
              ))}
            </div>
          </div>
          {renderDetail()}
        </div>
      );
    }

        e.preventDefault();
        const entry = {id:'pu-'+Date.now(),...form,ratePerKg:Number(form.ratePerKg),weight:Number(form.weight),bags:Number(form.bags),freight:Number(form.freight),bagSize,freightPerKg,totalCost};

      const closing = opening - (Number(form.consumedBags)||0);

        e.preventDefault();
        if(!matchedStock){alert('Item not found in godown!');return;}
        if(Number(form.consumedBags)>opening){alert('Insufficient stock!');return;}
        const entry = {id:'co-'+Date.now(),...form,consumedBags:Number(form.consumedBags),openingBags:opening,closingBags:closing,itemName:matchedStock.itemName};
        setConsumption(prev=>[entry,...prev]);
        setGodown(prev=>prev.map(g=>g.itemName?.toLowerCase()===form.itemName?.toLowerCase()?{...g,bags:closing}:g));
        alert('Consumption logged.');
        setForm({date:'',itemName:'',consumedBags:''});

              </div>
              <div className="grid-2">

    function LabourBook(p) {
      const [view, setView] = useState('DASHBOARD');
      const [workerModal, setWorkerModal] = useState(null);
      const [detail, setDetail] = useState(null);

      if (view === 'WORKERS') return <WorkerEntry {...p} onBack={()=>setView('DASHBOARD')} />;
      if (view === 'PAYMENTS') return <LabPaymentEntry {...p} onBack={()=>setView('DASHBOARD')} />;

      const analytics = useMemo(()=>{
        let totalPagar=0, totalBalance=0, totalAdvance=0;
        const advAlerts=[];
        const profiles = p.labour.map(w=>{
          totalPagar += w.pagarPerMonth;
          const endDate = w.leavingDate || BASE_DATE;
          const daysWorked = daysBetween(w.joiningDate, endDate);
          const earned = parseFloat(((w.pagarPerMonth/30)*daysWorked).toFixed(2));
          const draws = p.labPayLog.filter(lp=>lp.workerName?.toLowerCase()===w.workerName?.toLowerCase()).reduce((s,lp)=>s+lp.amountTaken,0);
          const net = earned - (w.oldAdvance + draws);
          let balance=0, advance=0;
          if(net<0){advance=Math.abs(net);totalAdvance+=advance;advAlerts.push({name:w.workerName,amount:Math.round(advance)});}
          else{balance=net;totalBalance+=balance;}
          return {...w,daysWorked,earned,draws,balance:Math.round(balance),advance:Math.round(advance)};
        });
        const activeCount = p.buffalo.filter(b=>!b.outgoingDate&&!['Dead','Slaughtered'].includes(b.status)).length||1;
        return {totalPagar,totalBalance:Math.round(totalBalance),totalAdvance:Math.round(totalAdvance),avgPerAnimal:parseFloat((totalPagar/activeCount).toFixed(2)),advAlerts,profiles};
      },[p.labour,p.labPayLog,p.buffalo]);

      const autoAdvance = name => {
        if(!name.trim()) return 0;
        const prof = analytics.profiles.find(pr=>pr.workerName?.toLowerCase()===name.trim().toLowerCase());
        return prof ? prof.advance : 0;
      };

      const renderDetail = () => {
        if(!detail) return null;
        let rows=[],title='';
        if(detail==='TOTAL_PAGAR'){title='Total Pagar Breakdown';rows=p.labour.map(w=>({k:w.workerName,v:'₹'+moneyFmt(w.pagarPerMonth)+'/Mo'}));}
        else if(detail==='AVG_PAGAR'){title='Avg Pagar Per Animal';rows=[{k:'Total Pagar',v:'₹'+moneyFmt(analytics.totalPagar)},{k:'Active Animals',v:p.buffalo.filter(b=>!b.outgoingDate&&!['Dead','Slaughtered'].includes(b.status)).length+'Hd'},{k:'Avg/Animal',v:'₹'+analytics.avgPerAnimal}];}
        else if(detail==='BALANCE'){title='Workers in Balance (Owed)';rows=analytics.profiles.filter(pr=>pr.balance>0).map(pr=>({k:pr.workerName,v:'₹'+moneyFmt(pr.balance)}));}
        else if(detail==='ADVANCE'){title='Workers in Advance (Overdraft)';rows=analytics.profiles.filter(pr=>pr.advance>0).map(pr=>({k:pr.workerName,v:'₹'+moneyFmt(pr.advance)+' ADVANCE'}));}
        return(
          <div className="overlay" onClick={()=>setDetail(null)}>
            <div className="modal-box" onClick={e=>e.stopPropagation()}>
              <div className="modal-title">👷 {title}</div>
              {rows.map((r,i)=><div key={i} className="report-row"><span className="report-key">{r.k}</span><span className="report-val">{r.v}</span></div>)}
              <button className="submit-btn" style={{marginTop:14,background:'var(--bg-back-btn)',color:'var(--primary)'}} onClick={()=>setDetail(null)}>Close</button>
            </div>
          </div>
        );
      };

      return (
        <div>
          <PageHeader title="Labour Book" sub="Payroll & Advance Management" onTheme={()=>p.setIsDark(!p.isDark)} isDark={p.isDark} />
          <div className="scroll-page" style={{paddingTop:10}}>
            <SectionDivider label="Labour Dashboard" />
            <div className="dash-grid-2">
              {[
                {label:'Total Workers Pagar',val:'₹'+moneyFmt(analytics.totalPagar),unit:'/Mo',color:'#10B981',det:'TOTAL_PAGAR',noFmt:true},
                {label:'Avg Pagar/Animal',val:'₹'+analytics.avgPerAnimal,unit:'/Hd',color:'#F59E0B',det:'AVG_PAGAR',noFmt:true},
                {label:'Pagar Balance Due',val:'₹'+moneyFmt(analytics.totalBalance),unit:'',color:'#3B82F6',det:'BALANCE',noFmt:true},
                {label:'Pagar Advance',val:'₹'+moneyFmt(analytics.totalAdvance),unit:'',color:'#EF4444',det:'ADVANCE',noFmt:true}
              ].map((c,i)=>(
                <div key={i} className="d-card" style={{borderLeft:`4px solid ${c.color}`}} onClick={()=>setDetail(c.det)}>
                  <div className="d-card-left"><div className="d-label">{c.label}</div>
                    <div className="d-val-sm" style={{color:c.color}}>{c.val}</div>
                    {c.unit&&<div className="d-unit">{c.unit}</div>}
                  </div><span style={{fontSize:12,color:'var(--text-muted)'}}>➔</span>
                </div>
              ))}
            </div>

            {analytics.advAlerts.length>0 && <>
              <SectionDivider label="Advance Alerts" />
              {analytics.advAlerts.map((a,i)=>(
                <div key={i} className="alert-box alert-danger">
                  <span className="alert-txt">🚨 <strong>{a.name}</strong> is running advance of ₹{moneyFmt(a.amount)}</span>
                  <span className="alert-badge" style={{background:'#EF4444',color:'#fff'}}>ADVANCE</span>
                </div>
              ))}
            </>}

            <SectionDivider label="Quick Actions" />
            <div className="dash-grid-2">
              <div className="action-card" style={{background:'linear-gradient(135deg,#10B98122,#10B98144)',border:'1px solid #10B98155'}} onClick={()=>setView('WORKERS')}>

            <SectionDivider label="Worker Status Table" />
            <div className="tbl-wrap">
              <table className="data-table">
                <thead><tr><th>Name</th><th>Shed</th><th>Days</th><th>Earned</th><th>Advance/Balance</th><th>Detail</th></tr></thead>
                <tbody>{analytics.profiles.map(pr=>(
                  <tr key={pr.id}>
                    <td style={{fontWeight:700}}>{pr.workerName}</td>
                    <td>{pr.shed}</td>
                    <td>{pr.daysWorked}d</td>
                    <td>₹{moneyFmt(Math.round(pr.earned))}</td>
                    <td style={{fontWeight:800,color:pr.advance>0?'#EF4444':'var(--primary)'}}>
                      {pr.advance>0?'ADV ₹'+moneyFmt(pr.advance):'BAL ₹'+moneyFmt(pr.balance)}
                    </td>
                    <td><button className="del-btn" style={{background:'#1A2E28',color:'#6EE7B7',borderColor:'#065F46'}} onClick={()=>setWorkerModal(pr)}>View</button></td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>

          {workerModal && (
            <div className="overlay" onClick={()=>setWorkerModal(null)}>
              <div className="modal-box" onClick={e=>e.stopPropagation()}>
                <div className="modal-title">🗂️ Worker Details — {workerModal.workerName}</div>
                {[
                  ['Shed',workerModal.shed],['Joining Date',workerModal.joiningDate],
                  ['Leaving Date',workerModal.leavingDate||'Active'],['Days Worked',workerModal.daysWorked+' Days'],
                  ['Pagar/Month','₹'+moneyFmt(workerModal.pagarPerMonth)],['Gross Earned','₹'+moneyFmt(Math.round(workerModal.earned))],
                  ['Old Advance','₹'+moneyFmt(workerModal.oldAdvance)],['New Draws','₹'+moneyFmt(workerModal.draws)],
                  [workerModal.advance>0?'ADVANCE OVERDRAFT':'BALANCE DUE',workerModal.advance>0?'₹'+moneyFmt(workerModal.advance):'₹'+moneyFmt(workerModal.balance)]
                ].map(([k,v],i)=>(
                  <div key={i} className="report-row" style={i===8?{borderTop:'1px solid var(--border-card)',paddingTop:8}:{}}>
                    <span className="report-key">{k}</span>

          {renderDetail()}
        </div>
      );
    }
