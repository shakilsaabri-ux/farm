    function AccountsBook(p) {
      const [view, setView] = useState('DASHBOARD');
      const [medForm, setMedForm] = useState({date:'',item:'',vendor:'',amount:''});

      const bhaisMap={};
      p.koriLog.forEach(k=>{if(!bhaisMap[k.bhaisWala])bhaisMap[k.bhaisWala]={purchased:0,paid:0};bhaisMap[k.bhaisWala].purchased+=k.amount;});
      p.bhaisPayLog.forEach(py=>{if(!bhaisMap[py.bhaisWala])bhaisMap[py.bhaisWala]={purchased:0,paid:0};bhaisMap[py.bhaisWala].paid+=py.amount;});
      const bhaisOutstanding = Object.values(bhaisMap).reduce((s,v)=>s+(v.purchased-v.paid),0);

      const danaMap={};
      p.purchases.forEach(pu=>{if(!danaMap[pu.broker])danaMap[pu.broker]={purchased:0,paid:0};danaMap[pu.broker].purchased+=pu.totalCost;});
      p.danaPayLog.forEach(py=>{if(!danaMap[py.broker])danaMap[py.broker]={purchased:0,paid:0};danaMap[py.broker].paid+=py.amount;});
      const danaOutstanding = Object.values(danaMap).reduce((s,v)=>s+(v.purchased-v.paid),0);

      const milkRevenue = p.supply.reduce((s,x)=>s+x.amount,0);
      const milkReceived = p.milkPayLog.reduce((s,x)=>s+x.amount,0);
      const slaRevenue = p.slaughtered.reduce((s,x)=>s+x.amount,0);
      const feedCost = p.purchases.reduce((s,x)=>s+x.totalCost,0);
      const medCost = p.medicineLog.reduce((s,x)=>s+x.amount,0);
      const koriCost = p.koriLog.reduce((s,x)=>s+x.amount,0);
      const nooraActive = p.buffalo.filter(b=>!b.outgoingDate&&!['Dead','Slaughtered'].includes(b.status)&&b.shed==='Noora').length;
      const tosifActive = p.buffalo.filter(b=>!b.outgoingDate&&!['Dead','Slaughtered'].includes(b.status)&&b.shed==='Tosif').length;
      const nooraBill = nooraActive*p.rates.nooraPerMonth;
      const tosifBill = tosifActive*p.rates.tosifPerMonth;
      const irshadBill = p.tajiLog.length*p.rates.irshadPerTaji + p.bakdiLog.length*p.rates.irshadPerBakdi;
      const labourCost = p.labour.reduce((s,w)=>s+w.pagarPerMonth,0);
      const totalIncome = milkRevenue + slaRevenue;
      const totalExpense = feedCost + medCost + koriCost + nooraBill + tosifBill + irshadBill + labourCost;

      const submitMed = e => {
        e.preventDefault();
        p.setMedicineLog(prev=>[...prev,{id:'med-'+Date.now(),...medForm,amount:Number(medForm.amount)}]);
        alert('Medicine entry saved.');
        setMedForm({date:'',item:'',vendor:'',amount:''});
      };

      if(view==='BHAIS_LEDGER') return(
        <div className="scroll-page" style={{paddingTop:10}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <span style={{color:'var(--primary)',fontWeight:800,fontSize:14,textTransform:'uppercase'}}>Bhaiswala Ledger</span>
            <BackBtn onClick={()=>setView('DASHBOARD')} />
          </div>
          <div className="tbl-wrap">
            <table className="data-table" style={{minWidth:0}}>
              <thead><tr><th>Name</th><th>Purchased</th><th>Paid</th><th>Balance</th></tr></thead>
              <tbody>{Object.entries(bhaisMap).map(([n,v])=>(
                <tr key={n}><td style={{fontWeight:700}}>{n}</td><td>₹{moneyFmt(v.purchased)}</td>
                  <td className="green-val">₹{moneyFmt(v.paid)}</td>
                  <td className={v.purchased-v.paid>0?'red-val':'green-val'} style={{fontWeight:800}}>₹{moneyFmt(v.purchased-v.paid)}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      );
      if(view==='DANA_LEDGER') return(
        <div className="scroll-page" style={{paddingTop:10}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <span style={{color:'var(--primary)',fontWeight:800,fontSize:14,textTransform:'uppercase'}}>Dana Wala Ledger</span>
            <BackBtn onClick={()=>setView('DASHBOARD')} />
          </div>
          <div className="tbl-wrap">
            <table className="data-table" style={{minWidth:0}}>
              <thead><tr><th>Broker</th><th>Purchased</th><th>Paid</th><th>Balance</th></tr></thead>
              <tbody>{Object.entries(danaMap).map(([n,v])=>(
                <tr key={n}><td style={{fontWeight:700}}>{n}</td><td>₹{moneyFmt(v.purchased)}</td>
                  <td className="green-val">₹{moneyFmt(v.paid)}</td>
                  <td className={v.purchased-v.paid>0?'red-val':'green-val'} style={{fontWeight:800}}>₹{moneyFmt(v.purchased-v.paid)}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      );
      if(view==='MEDICINE') return(
        <div className="scroll-page" style={{paddingTop:10}}>
          <div className="form-panel">
            <div className="panel-header"><span>Medicine Expenses</span><BackBtn onClick={()=>setView('DASHBOARD')} /></div>
            <form onSubmit={submitMed}>
              <div className="grid-2">
                <div className="input-row"><label className="field-lbl">Date</label><input type="date" className="farm-input" required value={medForm.date} onChange={e=>setMedForm({...medForm,date:e.target.value})} /></div>
                <div className="input-row"><label className="field-lbl">Medicine / Item</label><input type="text" className="farm-input" required value={medForm.item} onChange={e=>setMedForm({...medForm,item:e.target.value})} /></div>
              </div>
              <div className="grid-2">
                <div className="input-row"><label className="field-lbl">Vendor</label><input type="text" className="farm-input" value={medForm.vendor} onChange={e=>setMedForm({...medForm,vendor:e.target.value})} /></div>
                <div className="input-row"><label className="field-lbl">Amount (₹)</label><input type="number" className="farm-input" required value={medForm.amount} onChange={e=>setMedForm({...medForm,amount:e.target.value})} /></div>
              </div>
              <button type="submit" className="submit-btn">Save Medicine Entry</button>
            </form>
          </div>
          <SectionDivider label="Medicine Log" />
          <div className="tbl-wrap">
            <table className="data-table" style={{minWidth:0}}>
              <thead><tr><th>Date</th><th>Item</th><th>Vendor</th><th>Amount</th><th>Del</th></tr></thead>
              <tbody>{p.medicineLog.map(m=>(
                <tr key={m.id}><td>{m.date}</td><td style={{fontWeight:700}}>{m.item}</td><td>{m.vendor}</td>
                  <td className="red-val">₹{moneyFmt(m.amount)}</td>
                  <td><DelBtn onClick={()=>{if(window.confirm('Delete?'))p.setMedicineLog(prev=>prev.filter(x=>x.id!==m.id))}} /></td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
      );

      return (
        <div>
          <PageHeader title="Accounts" sub="Financial Overview" onTheme={()=>p.setIsDark(!p.isDark)} isDark={p.isDark} />
          <div className="scroll-page" style={{paddingTop:10}}>
            <SectionDivider label="Accounts Dashboard" />
            <div className="dash-grid-2">
              {[
                {label:'Bhaiswala Outstanding',val:'₹'+moneyFmt(bhaisOutstanding),color:'#EF4444',v:'BHAIS_LEDGER'},
                {label:'Dana Wala Outstanding',val:'₹'+moneyFmt(danaOutstanding),color:'#F59E0B',v:'DANA_LEDGER'},
                {label:'Milk Revenue',val:'₹'+moneyFmt(milkRevenue),color:'#10B981',v:'BHAIS_LEDGER'},
                {label:'Slaughter Revenue',val:'₹'+moneyFmt(slaRevenue),color:'#10B981',v:'BHAIS_LEDGER'},
                {label:'Total Income',val:'₹'+moneyFmt(totalIncome),color:'#34D399',v:'BHAIS_LEDGER'},
                {label:'Total Expense',val:'₹'+moneyFmt(totalExpense),color:'#EF4444',v:'BHAIS_LEDGER'},
              ].map((c,i)=>(
                <div key={i} className="d-card" style={{borderLeft:`4px solid ${c.color}`}} onClick={()=>setView(c.v)}>
                  <div className="d-card-left"><div className="d-label">{c.label}</div>
                    <div className="d-val-sm" style={{color:c.color}}>{c.val}</div>
                  </div><span style={{fontSize:12,color:'var(--text-muted)'}}>➔</span>
                </div>
              ))}
            </div>
            <SectionDivider label="Expense Breakdown" />
            <div className="form-panel">
              {[
                ['Kori (Buffalo Purchase)','₹'+moneyFmt(koriCost),'red-val'],
                ['Feed (Dana Wala)','₹'+moneyFmt(feedCost),'red-val'],
                ['Medicine','₹'+moneyFmt(medCost),'red-val'],
                ['Noora Bill ('+nooraActive+' Hd)','₹'+moneyFmt(nooraBill),'amber-val'],
                ['Tosif Bill ('+tosifActive+' Hd)','₹'+moneyFmt(tosifBill),'amber-val'],
                ['Irshad Freight','₹'+moneyFmt(irshadBill),'amber-val'],
                ['Labour Pagar','₹'+moneyFmt(labourCost),'red-val'],
              ].map(([k,v,cls],i)=>(
                <div key={i} className="report-row"><span className="report-key">{k}</span><span className={`report-val ${cls}`}>{v}</span></div>
              ))}
            </div>
            <SectionDivider label="Quick Links" />
            <div className="dash-grid-2">
              {[
                {label:'Bhaiswala Ledger',icon:'🐃',v:'BHAIS_LEDGER',color:'#F59E0B'},
                {label:'Dana Wala Ledger',icon:'🌾',v:'DANA_LEDGER',color:'#A855F7'},
                {label:'Medicine Log',icon:'💊',v:'MEDICINE',color:'#EF4444'},
              ].map(btn=>(
                <div key={btn.v} className="action-card" style={{background:`linear-gradient(135deg,${btn.color}22,${btn.color}44)`,border:`1px solid ${btn.color}55`}} onClick={()=>setView(btn.v)}>
                  <div className="ac-label">Accounts</div><div className="ac-title">{btn.icon} {btn.label}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ─────────────────────────────────────────────
    //  REPORTS BOOK
    // ─────────────────────────────────────────────
    function ReportsBook(p) {
      const [period, setPeriod] = useState('monthly');
      const [month, setMonth] = useState('2026-06');
      const [custFilter, setCustFilter] = useState('');

      const milkRevenue = p.supply.reduce((s,x)=>s+x.amount,0);
      const milkReceived = p.milkPayLog.reduce((s,x)=>s+x.amount,0);
      const slaRevenue = p.slaughtered.reduce((s,x)=>s+x.amount,0);
      const feedCost = p.purchases.reduce((s,x)=>s+x.totalCost,0);
      const medCost = p.medicineLog.reduce((s,x)=>s+x.amount,0);
      const koriCost = p.koriLog.reduce((s,x)=>s+x.amount,0);
      const labourCost = p.labour.reduce((s,w)=>s+w.pagarPerMonth,0);
      const nooraActive = p.buffalo.filter(b=>!b.outgoingDate&&!['Dead','Slaughtered'].includes(b.status)&&b.shed==='Noora').length;
      const tosifActive = p.buffalo.filter(b=>!b.outgoingDate&&!['Dead','Slaughtered'].includes(b.status)&&b.shed==='Tosif').length;
      const palakCost = nooraActive*p.rates.nooraPerMonth + tosifActive*p.rates.tosifPerMonth;
      const irshadCost = p.tajiLog.length*p.rates.irshadPerTaji + p.bakdiLog.length*p.rates.irshadPerBakdi;

      const customers = [...new Set(p.supply.map(s=>s.customer))];
      const getCustomerReport = cust => {
        const bills = p.supply.filter(s=>s.customer===cust);
        const pays = p.milkPayLog.filter(m=>m.customer===cust);
        const totalBill = bills.reduce((t,b)=>t+b.amount,0);
        const totalPaid = pays.reduce((t,py)=>t+py.amount,0);
        return {totalBill, totalPaid, outstanding:totalBill-totalPaid, entries:bills.length};
      };

      return (
        <div>
          <PageHeader title="Reports" sub="Analytics & Summary" onTheme={()=>p.setIsDark(!p.isDark)} isDark={p.isDark} />
          <div className="scroll-page" style={{paddingTop:10}}>

            <SectionDivider label="Overall Farm P&L Summary" />
            <div className="form-panel">
              {[
                ['Milk Revenue',milkRevenue,'green-val'],['Milk Received',milkReceived,'green-val'],
                ['Slaughter Revenue',slaRevenue,'green-val'],['Total Income',milkRevenue+slaRevenue,'green-val'],
                ['Feed Cost',feedCost,'red-val'],['Medicine Cost',medCost,'red-val'],
                ['Kori Purchase',koriCost,'red-val'],['Labour Pagar',labourCost,'red-val'],
                ['Palak Charges',palakCost,'amber-val'],['Irshad Freight',irshadCost,'amber-val'],
                ['Total Expense',feedCost+medCost+koriCost+labourCost+palakCost+irshadCost,'red-val'],
                ['NET P&L',milkRevenue+slaRevenue-(feedCost+medCost+koriCost+labourCost+palakCost+irshadCost),'green-val']
              ].map(([k,v,cls],i)=>(
                <div key={i} className="report-row" style={i===11?{borderTop:'2px solid var(--primary)',fontWeight:800}:{}}><span className="report-key">{k}</span><span className={`report-val ${cls}`}>₹{moneyFmt(v)}</span></div>
              ))}
            </div>

            <SectionDivider label="Customer-wise Milk Report" />
            <div className="input-row" style={{padding:'0 0 10px 0'}}>
              <label className="field-lbl">Filter by Customer</label>
              <select className="farm-select" value={custFilter} onChange={e=>setCustFilter(e.target.value)}>
                <option value="">-- All Customers --</option>
                {customers.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="tbl-wrap">
              <table className="data-table" style={{minWidth:0}}>
                <thead><tr><th>Customer</th><th>Total Bill</th><th>Paid</th><th>Outstanding</th></tr></thead>
                <tbody>{(custFilter?[custFilter]:customers).map(c=>{const r=getCustomerReport(c);return(
                  <tr key={c}><td style={{fontWeight:700}}>{c}</td><td>₹{moneyFmt(r.totalBill)}</td>
                    <td className="green-val">₹{moneyFmt(r.totalPaid)}</td>
                    <td className={r.outstanding>0?'red-val':'green-val'} style={{fontWeight:800}}>₹{moneyFmt(r.outstanding)}</td>
                  </tr>
                );})}</tbody>
              </table>
            </div>

            <SectionDivider label="Palak & Irshad Bill Summary" />
            <div className="form-panel">
              {[
                ['Noora ('+nooraActive+' Hd × ₹'+p.rates.nooraPerMonth+')',nooraActive*p.rates.nooraPerMonth],
                ['Tosif ('+tosifActive+' Hd × ₹'+p.rates.tosifPerMonth+')',tosifActive*p.rates.tosifPerMonth],
                ['Irshad — Taji ('+p.tajiLog.length+' × ₹'+p.rates.irshadPerTaji+')',p.tajiLog.length*p.rates.irshadPerTaji],
                ['Irshad — Bakdi ('+p.bakdiLog.length+' × ₹'+p.rates.irshadPerBakdi+')',p.bakdiLog.length*p.rates.irshadPerBakdi],
              ].map(([k,v],i)=>(
                <div key={i} className="report-row"><span className="report-key">{k}</span><span className="report-val amber-val">₹{moneyFmt(v)}</span></div>
              ))}
            </div>

            <SectionDivider label="Slaughtered Animals Summary" />
            <div className="tbl-wrap">
              <table className="data-table" style={{minWidth:0}}>
                <thead><tr><th>Tag</th><th>Date</th><th>Amount</th><th>Kasai</th></tr></thead>
                <tbody>{p.slaughtered.map(s=>(
                  <tr key={s.id}><td style={{fontWeight:700}}>{s.tagId}</td><td>{s.outgoingDate}</td>
                    <td className="green-val">₹{moneyFmt(s.amount)}</td><td>{s.kasaiName}</td></tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        </div>
      );
    }

    // ── RENDER ──
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
